!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | Book Haven</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="cart-body"> <main class="cart-page" style="max-width: 800px; margin: 50px auto; padding: 20px; background-color: rgba(255,255,255,0.05); border-radius: 15px;">
        <h1 style="text-align: center; margin-bottom: 30px; color: white;">Your Shopping Cart</h1>
        
        <div id="cart-container">
            </div>

        <div id="cart-total" style="text-align: right; margin-top: 20px; font-size: 1.2em; font-weight: bold; color: white;">
            </div>

        <div style="display: flex; justify-content: space-between; margin-top: 30px;">
            <a href="shop.html" class="view-btn" style="text-decoration: none;">Continue Shopping</a>
            <div>
                <button id="clear-cart-btn" style="padding: 10px 20px; cursor: pointer; background: #742C36; color: white; border: none; border-radius: 20px; margin-right: 10px;">Empty Cart</button>
                <button id="checkout-btn" style="padding: 10px 20px; cursor: pointer; background: #5C2E5C; color: white; border: none; border-radius: 20px;">Process Order</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
